version: '3.8'

services:
  habitflow:
    build: .
    container_name: habitflow
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/habits.db
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./habitflow_data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
